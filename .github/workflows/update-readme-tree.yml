name: Update README Tree

on:
  push:
    branches: [ main1.1 ]
  workflow_dispatch:

jobs:
  update-tree:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Update README with Short Names and Counts
        run: python .github/scripts/generate_tree.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update shortened tree with question counts [skip ci]" || exit 0
          git push
